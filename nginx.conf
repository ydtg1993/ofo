# =============================================================================
# nginx.conf — 全局配置（基于线上版本增强）
# 硬件: 2核 2G，配置已针对低配优化
# 适用: Go Gin 应用 (localhost:8080)
# 测试: nginx -t && nginx -s reload
# =============================================================================

user www-data;
worker_processes auto;
worker_cpu_affinity auto;
worker_rlimit_nofile 8192;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;
include /etc/nginx/modules-enabled/*.conf;

events {
        worker_connections  1024;
        multi_accept        on;
        use                 epoll;
}

http {

        ##
        # Basic Settings
        ##

        sendfile            on;
        sendfile_max_chunk  512k;
        tcp_nopush          on;
        tcp_nodelay         on;
        types_hash_max_size 2048;
        server_tokens       off;

        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        ##
        # SSL Settings
        ##

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        ##
        # Logging Settings
        ##

        log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                          '$status $body_bytes_sent "$http_referer" '
                          '"$http_user_agent" rt=$request_time uct=$upstream_connect_time '
                          'uht=$upstream_header_time urt=$upstream_response_time';

        access_log /var/log/nginx/access.log main buffer=64k flush=5s;

        ##
        # 性能优化（2C2G 低配调优）
        ##

        keepalive_timeout   30;
        keepalive_requests  30;
        client_body_timeout     10;
        client_header_timeout   10;
        send_timeout            10;
        reset_timedout_connection on;
        lingering_close        off;
        lingering_time         5s;
        lingering_timeout      3s;

        client_max_body_size        10m;
        client_body_buffer_size     64k;
        output_buffers              2 32k;

        variables_hash_max_size  2048;

        ##
        # Gzip Settings（2C2G：低级别省 CPU）
        ##

        gzip               on;
        gzip_vary          on;
        gzip_proxied        any;
        gzip_comp_level     2;
        gzip_min_length     512;
        gzip_buffers        8 8k;

        gzip_types
            text/plain
            text/css
            text/xml
            text/javascript
            text/csv
            text/markdown
            application/javascript
            application/json
            application/xml
            application/rss+xml
            application/atom+xml
            application/xhtml+xml
            application/x-font-ttf
            application/x-font-opentype
            application/vnd.ms-fontobject
            font/ttf
            font/otf
            font/opentype
            image/svg+xml
            image/x-icon;

        gzip_disable "msie6";

        ##
        # 静态文件缓存
        ##

        map $uri $static_cache_control {
            ~*\.(css|js|woff2?|ttf|otf|eot)$            "public, max-age=31536000, immutable";
            ~*\.(jpg|jpeg|png|gif|ico|svg|webp|avif)$   "public, max-age=31536000, immutable";
            default                                       "no-cache";
        }

        map $uri $static_expires {
            ~*\.(css|js|woff2?|ttf|otf|eot|jpg|jpeg|png|gif|ico|svg|webp|avif)$  "modified +1y";
            default                                                                off;
        }

        open_file_cache            max=500 inactive=30s;
        open_file_cache_valid      20s;
        open_file_cache_min_uses   1;
        open_file_cache_errors     off;

        ##
        # upstream（Go 后端）
        ##

        upstream blog_backend {
            server 127.0.0.1:8080 weight=1 max_fails=2 fail_timeout=30s;
            keepalive 16;
        }

        ##
        # 代理缓存区
        ##

        proxy_cache_path  /var/cache/nginx/page
                          levels=1:2
                          keys_zone=page_cache:10m
                          max_size=20m
                          inactive=5m
                          use_temp_path=off;

        proxy_cache_path  /var/cache/nginx/rss
                          levels=1:2
                          keys_zone=rss_cache:10m
                          max_size=20m
                          inactive=30m
                          use_temp_path=off;

        ##
        # 限流区
        ##

        limit_req_zone  $binary_remote_addr zone=global:10m rate=10r/s;
        limit_req_zone  $binary_remote_addr zone=login:10m rate=1r/s;
        limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

        ##
        # Virtual Host Configs
        ##

        include /etc/nginx/conf.d/*.conf;
        include /etc/nginx/sites-enabled/*;
}
