{{define "footer"}}
    </main>

    <!-- JSON-LD 结构化数据 -->
    {{template "jsonld" .}}

    <script src="{{asset "/static/js/main.js"}}"></script>
    {{mediaURLScript}}

    {{if not .Cfg.Debug}}<script src="{{asset "/static/js/protect.js"}}"></script>{{end}}
</body>
</html>
{{end}}

{{define "jsonld"}}
<script type="application/ld+json">
{{if .IsHome}}
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "{{.Cfg.Title}}",
  "url": "{{.Cfg.BaseURL}}",
  "description": "{{.Description}}",
  "author": { "@type": "Person", "name": "{{.Cfg.Author}}" },
  "potentialAction": {
    "@type": "SearchAction",
    "target": "{{.Cfg.BaseURL}}/search?q={search_term_string}",
    "query-input": "required name=search_term_string"
  }
}
{{else if .Post}}
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": "{{.Post.Title}}",
  "description": "{{.Post.Excerpt}}",
  "author": { "@type": "Person", "name": "{{.Cfg.Author}}" },
  "datePublished": "{{.Post.CreatedAt | formatDateShort}}",
  "dateModified": "{{.Post.UpdatedAt | formatDateShort}}",
  "mainEntityOfPage": { "@type": "WebPage", "@id": "{{.CanonicalURL}}" },
  "publisher": { "@type": "Organization", "name": "{{.Cfg.Title}}" }
  {{if .OGImage}},"image": "{{.OGImage}}"{{end}}
  {{if .PostCategoryName}},"articleSection": "{{.PostCategoryName}}"{{end}}
  {{if .PostTags}},"keywords": [{{range $i, $t := .PostTags}}{{if $i}}, {{end}}"{{$t.Name}}"{{end}}]{{end}}
}
{{else if .IsAbout}}
{
  "@context": "https://schema.org",
  "@type": "WebPage",
  "name": "关于 — {{.Cfg.Title}}",
  "description": "关于本站和作者",
  "url": "{{.CanonicalURL}}",
  "author": { "@type": "Person", "name": "{{.Cfg.Author}}" }
}
{{else}}
{
  "@context": "https://schema.org",
  "@type": "CollectionPage",
  "name": "{{.Title}}",
  "description": "{{.Description}}",
  "url": "{{.CanonicalURL}}"
}
{{end}}
</script>
{{if .Post}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    { "@type": "ListItem", "position": 1, "name": "首页", "item": "{{.Cfg.BaseURL}}" }
    {{if .PostCategoryName}},
    { "@type": "ListItem", "position": 2, "name": "{{.PostCategoryName}}", "item": "{{.Cfg.BaseURL}}/category/{{.PostCategorySlug}}" },
    { "@type": "ListItem", "position": 3, "name": "{{.Post.Title}}" }
    {{else}},
    { "@type": "ListItem", "position": 2, "name": "{{.Post.Title}}" }
    {{end}}
  ]
}
</script>
{{end}}
{{end}}
