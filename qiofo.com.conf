# =============================================================================
# qiofo.com.conf — 博客 vhost（HTTPS + 性能优化）
# 硬件: 2核 2G，配置已针对低配优化
# 适用: Go Gin 应用 (localhost:8080)
# 测试: nginx -t && nginx -s reload
# =============================================================================

# =====================================================================
# HTTP → HTTPS 重定向
# =====================================================================
server {
    listen       80;
    listen       [::]:80;
    server_name  qiofo.com www.qiofo.com;

    # Let's Encrypt 验证（ACME challenge）
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    # 其他全部 301 到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# =====================================================================
# HTTPS 主站
# =====================================================================
server {
    listen       443 ssl;
    listen       [::]:443 ssl;
    http2        on;                 # HTTP/2 多路复用
    server_name  qiofo.com www.qiofo.com;

    ## ----- SSL 证书 -----
    ssl_certificate         /etc/letsencrypt/live/qiofo.com/fullchain.pem;
    ssl_certificate_key     /etc/letsencrypt/live/qiofo.com/privkey.pem;

    ## ----- SSL 安全配置（Mozilla Intermediate，兼容性好）-----
    ssl_session_timeout  1d;
    ssl_session_cache    shared:SSL:10m;        # 10MB，约 8w 会话（2G 内存不宜过大）
    ssl_session_tickets  off;                   # 禁用 session ticket（PFS）

    # TLS 协议版本
    ssl_protocols  TLSv1.2 TLSv1.3;

    # 加密套件（TLS 1.2 + 1.3，必须写在一行）
    ssl_ciphers  ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers  off;             # 让客户端选择最优套件

    # OCSP Stapling（减少客户端验证延迟）
    ssl_stapling            on;
    ssl_stapling_verify     on;
    resolver                8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout        5s;

    # DH 参数（提高密钥交换安全性）
    # 生成: openssl dhparam -out /etc/nginx/ssl/dhparam.pem 2048
    ssl_dhparam  /etc/nginx/ssl/dhparam.pem;

    # HSTS（浏览器强制 HTTPS，首次访问后生效）
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # =============================================================
    # 静态资源（由 nginx 直接响应，不经过 Go）
    # =============================================================
    location /static/ {
        alias  /var/www/ofo/static/;
        expires $static_expires;
        add_header Cache-Control $static_cache_control;
        add_header X-Content-Type-Options "nosniff";

        # 安全限制：静态目录只允许 GET/HEAD
        limit_except GET HEAD {
            deny all;
        }

        # 静态资源不记录访问日志（减少 I/O）
        access_log off;
    }

    # favicon
    location = /favicon.ico {
        alias  /var/www/ofo/static/favicon.ico;
        expires 7d;
        access_log off;
    }

    # =============================================================
    # RSS Feed（nginx 缓存，减少后端压力）
    # =============================================================
    location ~* ^/(rss\.xml|feed\.xml)$ {
        proxy_pass         http://blog_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection       "";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # nginx 缓存 RSS 响应 10 分钟
        proxy_cache            rss_cache;
        proxy_cache_valid      200 10m;
        proxy_cache_use_stale  error timeout updating http_500 http_502 http_503 http_504;

        add_header X-Cache-Status $upstream_cache_status;
    }

    # =============================================================
    # 管理后台登录（严格限流：1 r/s，突发 3）
    # =============================================================
    location /admin/login {
        limit_req  zone=login burst=3 nodelay;
        limit_conn conn_per_ip 5;

        proxy_pass         http://blog_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   Connection        "";

        proxy_connect_timeout    10s;
        proxy_send_timeout       30s;
        proxy_read_timeout       30s;
    }

    # =============================================================
    # 首页微缓存（5s，应对突发流量，发布文章后最多5秒生效）
    # =============================================================
    location = / {
        limit_req  zone=global burst=20 nodelay;
        limit_conn conn_per_ip 20;

        proxy_pass         http://blog_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   Connection        "";

        # 微缓存：5s 有效，陈旧时继续用旧缓存异步更新
        proxy_cache            page_cache;
        proxy_cache_valid      200 5s;
        proxy_cache_use_stale  error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock       on;         # 同一 URL 只发一个后端请求
        proxy_cache_lock_timeout 3s;

        proxy_buffering          on;
        proxy_buffer_size        8k;
        proxy_buffers            16 8k;
        proxy_busy_buffers_size  16k;

        proxy_connect_timeout    10s;
        proxy_send_timeout       30s;
        proxy_read_timeout       30s;

        add_header X-Cache-Status $upstream_cache_status;
    }

    # =============================================================
    # 管理后台（不缓存，不限流，避免影响正常管理操作）
    # =============================================================
    location /admin {
        proxy_pass         http://blog_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   Connection        "";

        # 管理后台不缓存
        proxy_no_cache     1;
        proxy_cache_bypass 1;

        proxy_connect_timeout    10s;
        proxy_send_timeout       60s;     # 上传文件可能较慢
        proxy_read_timeout       60s;
    }

    # =============================================================
    # 主站请求（反向代理到 Go 后端）
    # =============================================================
    location / {
        # 限流：10 r/s + 单 IP 最大并发 20
        limit_req  zone=global burst=20 nodelay;
        limit_conn conn_per_ip 20;

        proxy_pass         http://blog_backend;
        proxy_http_version 1.1;

        # Header 透传
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        proxy_set_header   X-Request-ID      $request_id;

        # 长连接（配合 upstream keepalive）
        proxy_set_header   Connection        "";

        # 缓冲（低配减半）
        proxy_buffering          on;
        proxy_buffer_size        8k;
        proxy_buffers            16 8k;
        proxy_busy_buffers_size  16k;

        # 超时
        proxy_connect_timeout    10s;
        proxy_send_timeout       30s;
        proxy_read_timeout       30s;

        # 后端错误时的降级页
        proxy_intercept_errors  on;
        error_page  502 503 504  /50x.html;
    }

    # 自定义错误页
    location = /50x.html {
        root   /usr/share/nginx/html;
        internal;
    }

    # =============================================================
    # 安全：禁止访问隐藏文件
    # =============================================================
    location ~ /\. {
        deny  all;
        access_log off;
        log_not_found off;
    }
}
